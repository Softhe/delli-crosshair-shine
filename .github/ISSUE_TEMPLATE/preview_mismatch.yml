name: Preview mismatch
description: Report a visible difference between the browser preview and CS2.
title: "[Preview]: "
labels: [preview, usability]
body:
  - type: textarea
    id: settings
    attributes:
      label: Crosshair settings
      description: Share the settings or a redacted reproducible code.
    validations:
      required: true
  - type: textarea
    id: difference
    attributes:
      label: Observed difference
      description: Compare the browser preview with the in-game appearance.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Display and CS2 settings
      placeholder: 1920x1080, 16:9, 100% HUD scale
