name: Incorrect CS2 output
description: Report a share-code, console-command, or CFG output problem.
title: "[Output]: "
labels: [output, correctness]
body:
  - type: markdown
    attributes:
      value: |
        Please redact share codes if they contain anything you do not want to publish. Include only the settings needed to reproduce the problem.
  - type: textarea
    id: source
    attributes:
      label: Source settings or share code
      description: Provide a reproducible source, with private values redacted if needed.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Incorrect output
      description: Explain which generated convar, share code, or CFG line is wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
    validations:
      required: true
